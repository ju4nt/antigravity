version: '3.8'
services:
  # La base de datos para tus registros de nómina y turnos
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: tu_password_secreta
    volumes:
      - ./data:/var/lib/postgresql/data

  # Herramienta para crear el Formulario de Tipificación y el ERP visual
  app-builder:
    image: appsmith/appsmith-ce
    ports:
      - "8080:8080"
    volumes:
      - ./stacks:/appsmith-stacks

  # El cerebro que conecta Chatbots y Voicebots
  automation:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin