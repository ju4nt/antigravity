version: "3.9"

services:

  # в”Ђв”Ђв”Ђ CORE: Cerebro de Elizabeth (FastAPI) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  elizabeth-core:
    build: ./core
    container_name: elizabeth-core
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=elizabeth-db
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - REDIS_URL=redis://elizabeth-redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PBX_HOST=${PBX_HOST}
      - PBX_AMI_PORT=5038
      - PBX_AMI_USER=${PBX_AMI_USER}
      - PBX_AMI_PASS=${PBX_AMI_PASS}
    volumes:
      - ./data:/app/data
    depends_on:
      - elizabeth-db
      - elizabeth-redis
    networks:
      - elizabeth-net

  # в”Ђв”Ђв”Ђ BRIDGE: Hub Omnicanal (Evolution API / Node.js) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  elizabeth-bridge:
    build: ./bridge
    container_name: elizabeth-bridge
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CORE_URL=http://elizabeth-core:8000
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - WHATSAPP_INSTANCE=${WHATSAPP_INSTANCE}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}
    depends_on:
      - elizabeth-core
    networks:
      - elizabeth-net

  # в”Ђв”Ђв”Ђ DATABASE: MySQL 8 con Modelo Estrella в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  elizabeth-db:
    image: mysql:8.0
    container_name: elizabeth-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - elizabeth-net

  # в”Ђв”Ђв”Ђ REDIS: Bus de eventos en tiempo real в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  elizabeth-redis:
    image: redis:7-alpine
    container_name: elizabeth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - elizabeth-net

  # в”Ђв”Ђв”Ђ FRONTEND: Smart Pop-up (Next.js 14) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  elizabeth-ui:
    build: ./frontend
    container_name: elizabeth-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - elizabeth-core
    networks:
      - elizabeth-net

networks:
  elizabeth-net:
    driver: bridge
